<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brad anderson jr | technical creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Noto Sans Mono', monospace; }
    </style>
</head>
<body class="min-h-screen bg-white text-slate-900 selection:bg-[#fcbf47]/30">

    <!-- Header Section -->
    <header class="py-24 px-6 max-w-6xl mx-auto border-b border-slate-100">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-8">
            <div>
                <p class="mono text-slate-400 text-lg mb-4 font-medium tracking-tight">> whoami</p>
                <h1 class="text-7xl font-black tracking-tighter mb-4 lowercase">brad anderson jr</h1>
                <p class="text-slate-500 text-2xl max-w-2xl leading-relaxed">
                    technical creator bridging the gap between digital code and physical fabrication. 
                    owner of <span class="text-slate-900 font-semibold italic uppercase">anderson ideaworks llc</span>.
                </p>
            </div>
            <div class="flex gap-4">
                <!-- Website Link -->
                <a href="https://bradandersonjr.com" target="_blank" class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-[#fcbf47] hover:text-[#fcbf47] hover:shadow-[0_12px_25px_-10px_rgba(252,191,71,0.3)] text-slate-700">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                </a>
                <!-- GitHub Link -->
                <a href="https://github.com/bradandersonjr" target="_blank" class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-[#fcbf47] hover:text-[#fcbf47] hover:shadow-[0_12px_25px_-10px_rgba(252,191,71,0.3)] text-slate-700">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </a>
                <!-- Email Link -->
                <a href="mailto:brad@andersonideaworks.com" class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-[#fcbf47] hover:text-[#fcbf47] hover:shadow-[0_12px_25px_-10px_rgba(252,191,71,0.3)] text-slate-700">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Gallery -->
    <main class="py-20 px-6 max-w-6xl mx-auto">
        <div class="flex items-center justify-between mb-12">
            <h2 class="text-base font-bold uppercase tracking-[0.25em] text-slate-400 lowercase">project archive</h2>
            <div class="text-sm mono text-slate-400 hidden sm:block border border-slate-200 px-5 py-2 rounded-full">
                nodes_indexed: <span id="repo-count" class="text-slate-900 font-bold">--</span>
            </div>
        </div>

        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Loading state -->
            <div class="col-span-full py-20 text-center mono text-slate-300 animate-pulse">
                scanning /projects/...
            </div>
        </div>
    </main>

    <footer class="py-24 text-center text-slate-400 text-base border-t border-slate-50 mt-16">
        <p class="mono tracking-widest lowercase">© <span id="year"></span> bradandersonjr.dev // precision & purpose</p>
    </footer>

    <script>
        const REPO_OWNER = 'bradandersonjr';
        const REPO_NAME = 'bradandersonjr.github.io';
        const PROJECTS_PATH = 'projects';

        async function fetchProjects() {
            const container = document.getElementById('gallery');
            const countEl = document.getElementById('repo-count');

            try {
                // 1. Ask GitHub API for a list of files in the /projects folder
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PROJECTS_PATH}`);
                
                if (!response.ok) throw new Error('Could not scan directory');
                
                const files = await response.json();
                
                // 2. Filter for only .json files
                const jsonFiles = files.filter(file => file.name.endsWith('.json'));
                
                // 3. Fetch the content of each JSON file
                const projectData = await Promise.all(jsonFiles.map(async (file) => {
                    const res = await fetch(file.download_url);
                    return res.json();
                }));

                // 4. Update the UI
                countEl.textContent = projectData.length.toString().padStart(2, '0');
                renderGallery(projectData);

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="col-span-full text-center py-10 text-red-400 mono">error: failed to load project data. please ensure /projects folder exists.</div>`;
            }
        }

        function renderGallery(data) {
            const container = document.getElementById('gallery');
            
            const statusStyles = {
                'active': 'bg-green-50 text-green-700 border-green-200',
                'beta': 'bg-amber-50 text-amber-700 border-amber-200',
                'in development': 'bg-sky-50 text-sky-700 border-sky-200',
                'archive': 'bg-slate-50 text-slate-600 border-slate-200'
            };

            container.innerHTML = data.map(project => `
                <div class="bg-white border border-slate-200 p-10 rounded-[1.5rem] shadow-sm flex flex-col justify-between transition-all duration-300 hover:-translate-y-1 hover:border-[#fcbf47] hover:shadow-[0_12px_25px_-10px_rgba(252,191,71,0.3)] group">
                    <div>
                        <div class="flex justify-between items-start mb-8">
                            <span class="text-[12px] mono font-bold px-4 py-1.5 rounded-full border lowercase ${statusStyles[project.status.toLowerCase()] || statusStyles['archive']}">
                                ${project.status}
                            </span>
                            <span class="text-[12px] font-bold text-slate-300 uppercase tracking-widest lowercase">${project.category}</span>
                        </div>
                        <h3 class="text-3xl font-black mb-4 text-slate-900 lowercase group-hover:text-slate-950">${project.title}</h3>
                        <p class="text-slate-500 text-lg leading-relaxed mb-10 lowercase">${project.description}</p>
                    </div>
                    
                    <div>
                        <div class="flex flex-wrap gap-2.5 mb-10">
                            ${project.tags.map(tag => `
                                <span class="text-[12px] mono text-slate-400 bg-slate-50 border border-slate-100 px-2.5 py-1 rounded-lg lowercase">#${tag}</span>
                            `).join('')}
                        </div>
                        <a href="${project.link}" target="_blank" class="block w-full text-center py-5 bg-slate-900 text-white rounded-2xl font-bold transition-all duration-200 hover:bg-[#fcbf47] hover:text-slate-900 active:scale-[0.97] lowercase text-xl">
                            view project
                        </a>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('year').textContent = new Date().getFullYear();
        fetchProjects();
    </script>
</body>
</html>
